<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Utility Hub</title>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    header h1 {
      font-size: 1.5rem;
      color: var(--accent);
    }

    nav a {
      margin-left: 1rem;
      color: var(--muted);
      text-decoration: none;
      transition: 0.2s;
    }

    nav a:hover {
      color: var(--accent);
    }

    main {
      flex: 1;
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--card);
      padding: 1.5rem;
      border-radius: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .card h2 {
      margin-bottom: 0.5rem;
    }

    .card p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(56,189,248,0.2), transparent);
      opacity: 0;
      transition: 0.3s;
    }

    .card:hover::after {
      opacity: 1;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .hero {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 1rem;
    }

    .hero h2 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .hero span {
      color: var(--accent);
    }

    button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #000;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<header>
  <h1>Utility Hub</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Tools</a>
    <a href="#">About</a>
  </nav>
</header>

<main>
  <div class="hero">
    <h2>Build. <span>Experiment.</span> Expand.</h2>
    <p>Your personal toolkit starts here.</p>
    <button onclick="randomGreeting()">Click Me</button>
  </div>

  <div class="card">
    <h2>Calculator</h2>
    <p>Basic math tools coming soon.</p>
  </div>

  <div class="card">
    <h2>Converter</h2>
    <p>Unit & data conversions.</p>
  </div>

  <div class="card">
    <h2>Visualizer</h2>
    <p>Graphs and interactive tools.</p>
  </div>

  <div class="card">
    <h2>Sandbox</h2>
    <p>Test ideas and experiments.</p>
  </div>

</main>

<footer>
  © 2026 My Utility Hub
</footer>

<script>
  function randomGreeting() {
    const messages = [
      "You're building something cool.",
      "Keep going.",
      "This will evolve into something powerful.",
      "Your future tools live here.",
      "Small steps → big systems."
    ];
    alert(messages[Math.floor(Math.random() * messages.length)]);
  }
</script>

</body>
</html>
