<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ouroboros</title>
  <link rel="icon" type="image/png" href="Ouroboros.png">

  <!-- CodeMirror -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #020617, #0f172a);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.5rem;
      color: var(--accent);
    }

    .logo img {
      width: 56px;
      height: auto;
    }

    nav a {
      margin-left: 1rem;
      color: var(--muted);
      text-decoration: none;
    }

    nav a:hover {
      color: var(--accent);
    }

    main {
      flex: 1;
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 300px));
      gap: 1.5rem;
      justify-content: center;
    }

    .card {
      background: var(--card);
      padding: 1.5rem;
      border-radius: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .hero {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 1rem;
    }

    .hero h2 {
      font-size: 2rem;
    }

    .hero span {
      color: var(--accent);
    }

    button {
      margin-top: 1rem;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      cursor: pointer;
      font-weight: bold;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hidden { display: none; }

    .modal-content {
      background: var(--card);
      padding: 2rem;
      border-radius: 16px;
      width: 90%;
      max-width: 600px;
    }

    input, textarea {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      margin: 0.5rem 0;
    }

    pre {
      margin-top: 1rem;
      white-space: pre-wrap;
    }

    #chatBox div {
      margin: 6px 0;
      padding: 8px;
      border-radius: 8px;
      max-width: 80%;
    }

    /* ========================= */
    /* CODEMIRROR FIX (IMPORTANT)
    /* ========================= */

    .CodeMirror {
      height: 220px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
    }

    .CodeMirror-gutters {
      background: #0b1220;
      border-right: 1px solid rgba(255,255,255,0.08);
      padding-right: 6px;
    }

    .CodeMirror-linenumber {
      padding-right: 8px;
      color: var(--muted);
    }

    .CodeMirror-sizer {
      margin-left: 10px !important;
    }

    .CodeMirror pre {
      padding-left: 10px !important;
    }
  </style>
</head>

<body>

<header>
  <h1 class="logo">
    Ouroboros Hub
    <img src="Ouroboros.png" alt="logo">
  </h1>

  <nav>
    <a href="#">Home</a>
    <a href="#">Tools</a>
    <a href="#">About</a>
  </nav>
</header>

<main>

  <div class="hero">
    <h2>Build. <span>Experiment.</span> Expand.</h2>
    <p>What you build, you return to.</p>
    <button onclick="randomGreeting()">Click Me</button>
  </div>

  <div class="card" onclick="openCalculator()">
    <h2>Calculator</h2>
    <p>Evaluate expressions and explore math.</p>
  </div>

  <div class="card" onclick="openMusic()">
    <h2>Music Player</h2>
    <p>YouTube playlist + controls</p>
  </div>

  <div class="card" onclick="openPython()">
    <h2>OuroShell</h2>
    <p>Run Python code in-browser.</p>
  </div>

 <div class="card">
  <h2>Placeholder</h2>
  <p>Coming Soon!</p>.</p>
</div>

</main>

<!-- MUSIC -->
<div id="musicModal" class="modal hidden">
  <div class="modal-content">
    <h2>YouTube Player</h2>

    <input id="ytInput" placeholder="YouTube link" />
    <button onclick="loadMedia()">Load</button>

    <div id="player"></div>

    <button onclick="prevVideo()">⏮</button>
    <button onclick="togglePlay()">▶/⏸</button>
    <button onclick="nextVideo()">⏭</button>

    <input type="range" min="0" max="100" onchange="setVolume(this.value)">
    <button onclick="closeMusic()">Close</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* MUSIC FIXED */
let player;

function openMusic(){musicModal.classList.remove("hidden")}
function closeMusic(){musicModal.classList.add("hidden")}

function getVideoID(url){
  const m=url.match(/(?:v=|youtu\.be\/)([^&]+)/);
  return m?m[1]:url;
}

function getPlaylistID(url){
  const m=url.match(/[?&]list=([^&]+)/);
  return m?m[1]:null;
}

function onYouTubeIframeAPIReady(){
  player=new YT.Player("player",{height:"260",width:"100%",videoId:""});
}

function loadMedia(){
  const url=document.getElementById("ytInput").value;
  const list=getPlaylistID(url);

  if(list){
    player.loadPlaylist({listType:"playlist",list});
  }else{
    player.loadVideoById(getVideoID(url));
  }
}

function togglePlay(){
  if(player.getPlayerState()===1) player.pauseVideo();
  else player.playVideo();
}

function nextVideo(){player.nextVideo()}
function prevVideo(){player.previousVideo()}
function setVolume(v){player.setVolume(v)}

</script>

</body>
</html>
